name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Run tests
        # The whole suite is offline (LLM calls are monkeypatched); no API key needed.
        run: uv run pytest -q
