# HAX-18 — Guidelines for Human-AI Interaction (Amershi et al., CHI 2019, Microsoft).
# Codificadas como items atomicos y enlazables. Cada hallazgo del sistema se ata
# a uno o varios de estos ids. Descripcion en espanol; titulo original entre ().
corpus: HAX
guidelines:
  # --- Inicialmente ---
  - id: HAX-G1
    group: Inicialmente
    title: "Dejar claro que puede hacer el sistema (Make clear what the system can do)"
    description: >-
      El usuario debe poder entender de que es capaz el sistema de IA antes y
      durante el uso, sin tener que descubrirlo por ensayo y error.
    good_example: "Al iniciar, una nota explica que el cribado solo sugiere prioridad de derivacion, no diagnostica."
    bad_example: "El usuario no sabe si la herramienta decide la derivacion o solo la sugiere."
    anti_patterns:
      - "Ausencia de descripcion de capacidades/alcance en el onboarding."
      - "Capacidades implicitas que el usuario debe inferir del comportamiento."

  - id: HAX-G2
    group: Inicialmente
    title: "Dejar claro como de bien lo hace (Make clear how well the system can do what it can do)"
    description: >-
      Comunicar el rendimiento y sus limites (cuando puede equivocarse) para
      calibrar la confianza del usuario y evitar sobre-confianza (automation bias).
    good_example: "Se muestra el rendimiento por subgrupo y se avisa de menor fiabilidad en poblacion pediatrica."
    bad_example: "Se presenta la salida como certera sin indicar tasa de error ni limitaciones."
    anti_patterns:
      - "No comunicar incertidumbre ni tasas de error."
      - "Presentar todas las salidas con la misma autoridad aparente."
      - "Confianza no calibrada por subgrupo."

  # --- Durante la interaccion ---
  - id: HAX-G3
    group: Durante la interaccion
    title: "Temporizar el servicio segun el contexto (Time services based on context)"
    description: "Actuar o interrumpir en el momento adecuado segun la tarea y el entorno del usuario."
    good_example: "La sugerencia aparece al cerrar la consulta, no en mitad de la exploracion del paciente."
    bad_example: "La alerta interrumpe justo cuando el clinico esta escribiendo la anamnesis."
    anti_patterns:
      - "Interrupciones mal temporizadas que cortan el flujo de trabajo."

  - id: HAX-G4
    group: Durante la interaccion
    title: "Mostrar informacion contextualmente relevante (Show contextually relevant information)"
    description: "Presentar la informacion pertinente a la tarea y al contexto actuales."
    good_example: "Junto a la prioridad se muestran los factores del paciente que la motivan."
    bad_example: "Se muestra una puntuacion aislada sin el contexto clinico que la explica."
    anti_patterns:
      - "Informacion generica no adaptada a la tarea concreta."

  - id: HAX-G5
    group: Durante la interaccion
    title: "Ajustarse a las normas sociales relevantes (Match relevant social norms)"
    description: "Entregar la experiencia respetando las normas sociales y culturales esperadas en el contexto."
    good_example: "El lenguaje y el tono se ajustan al registro clinico y a la relacion medico-paciente."
    bad_example: "Mensajes con tono inadecuado o terminologia que no encaja en el entorno sanitario."
    anti_patterns:
      - "Tono o registro inapropiado para el contexto de uso."

  - id: HAX-G6
    group: Durante la interaccion
    title: "Mitigar los sesgos sociales (Mitigate social biases)"
    description: "Asegurar que el lenguaje y el comportamiento no refuerzan estereotipos ni sesgos indeseados."
    good_example: "Se audita que las recomendaciones no varien injustamente por sexo o etnia a igual cuadro clinico."
    bad_example: "La prioridad cambia por variables protegidas sin justificacion clinica."
    anti_patterns:
      - "Refuerzo de estereotipos en lenguaje o decisiones."
      - "Sesgo de subgrupo no monitorizado en la interaccion."

  # --- Cuando se equivoca ---
  - id: HAX-G7
    group: Cuando se equivoca
    title: "Permitir invocacion eficiente (Support efficient invocation)"
    description: "Facilitar que el usuario invoque o solicite el servicio de IA cuando lo necesita."
    good_example: "El clinico puede pedir un re-calculo de prioridad con un solo clic."
    bad_example: "Re-ejecutar el cribado exige navegar por varios menus."
    anti_patterns:
      - "Invocacion del servicio costosa o escondida."

  - id: HAX-G8
    group: Cuando se equivoca
    title: "Permitir descarte eficiente (Support efficient dismissal)"
    description: "Permitir ignorar o descartar facilmente las sugerencias no deseadas."
    good_example: "La sugerencia puede descartarse sin friccion y no reaparece de inmediato."
    bad_example: "No hay forma clara de cerrar o ignorar la recomendacion."
    anti_patterns:
      - "Sugerencias persistentes que no se pueden descartar."
      - "Fatiga de alerta por avisos no descartables."

  - id: HAX-G9
    group: Cuando se equivoca
    title: "Permitir correccion eficiente (Support efficient correction)"
    description: >-
      Facilitar que el usuario edite, refine o anule (override) la salida cuando
      discrepa, y capturar esa correccion de forma util.
    good_example: "El override del clinico se registra con motivo estructurado y alimenta la supervision."
    bad_example: "El clinico puede ignorar la sugerencia, pero su discrepancia no se captura en ningun sitio."
    anti_patterns:
      - "Override no capturado o capturado sin motivo/estructura."
      - "Correccion posible pero invisible para la supervision del sistema."
      - "Friccion alta para corregir, que empuja a aceptar por defecto."

  - id: HAX-G10
    group: Cuando se equivoca
    title: "Acotar el servicio ante la duda (Scope services when in doubt)"
    description: "Limitar o desactivar el servicio (o pedir desambiguacion) cuando la incertidumbre es alta."
    good_example: "Ante datos insuficientes, el sistema se abstiene y lo indica en lugar de forzar una prioridad."
    bad_example: "Emite una prioridad confiada aun con datos claramente incompletos."
    anti_patterns:
      - "No abstenerse ni degradar con elegancia bajo alta incertidumbre."

  - id: HAX-G11
    group: Cuando se equivoca
    title: "Dejar claro por que hizo lo que hizo (Make clear why the system did what it did)"
    description: "Permitir acceder a una explicacion de por que el sistema actuo como actuo."
    good_example: "El usuario puede ver los factores que mas pesaron en la prioridad asignada."
    bad_example: "La salida es una caja negra sin explicacion accesible."
    anti_patterns:
      - "Ausencia de explicacion accesible de las decisiones."

  # --- Con el tiempo ---
  - id: HAX-G12
    group: Con el tiempo
    title: "Recordar interacciones recientes (Remember recent interactions)"
    description: "Mantener memoria a corto plazo de la interaccion para no obligar a repetir contexto."
    good_example: "El sistema recuerda el paciente en curso entre pasos del flujo."
    bad_example: "El usuario debe reintroducir datos ya aportados en el mismo episodio."
    anti_patterns:
      - "Perdida de contexto reciente que obliga a repetir trabajo."

  - id: HAX-G13
    group: Con el tiempo
    title: "Aprender del comportamiento del usuario (Learn from user behavior)"
    description: "Personalizar la experiencia aprendiendo de las acciones del usuario a lo largo del tiempo."
    good_example: "El sistema adapta el detalle mostrado segun como cada perfil usa la herramienta."
    bad_example: "La experiencia es identica e ignora patrones de uso evidentes."
    anti_patterns:
      - "No aprovechar senales de comportamiento para mejorar la experiencia."

  - id: HAX-G14
    group: Con el tiempo
    title: "Actualizar y adaptarse con cautela (Update and adapt cautiously)"
    description: "Limitar cambios disruptivos en el comportamiento del sistema que rompan los modelos mentales del usuario."
    good_example: "Los cambios de comportamiento se introducen de forma gradual y avisada."
    bad_example: "Una actualizacion cambia el significado de la puntuacion sin aviso."
    anti_patterns:
      - "Cambios disruptivos no gestionados que rompen el modelo mental."

  - id: HAX-G15
    group: Con el tiempo
    title: "Fomentar feedback granular (Encourage granular feedback)"
    description: "Permitir al usuario dar feedback detallado durante el uso habitual."
    good_example: "El usuario puede marcar por que una sugerencia fue util o no, con categorias."
    bad_example: "Solo existe un pulgar arriba/abajo sin matiz, o ningun feedback."
    anti_patterns:
      - "Canales de feedback inexistentes o demasiado gruesos."

  - id: HAX-G16
    group: Con el tiempo
    title: "Transmitir las consecuencias de las acciones del usuario (Convey the consequences of user actions)"
    description: "Dejar claro como las acciones o el feedback del usuario afectaran al comportamiento futuro del sistema."
    good_example: "Se indica que registrar el motivo del override mejorara la supervision del subgrupo."
    bad_example: "El usuario no sabe si su correccion tiene algun efecto."
    anti_patterns:
      - "Consecuencias de las acciones del usuario opacas."

  - id: HAX-G17
    group: Con el tiempo
    title: "Proveer controles globales (Provide global controls)"
    description: "Permitir al usuario configurar globalmente que monitoriza y como se comporta el sistema."
    good_example: "El servicio permite activar/desactivar tipos de alerta o ajustar umbrales."
    bad_example: "No hay forma de configurar el comportamiento global del sistema."
    anti_patterns:
      - "Ausencia de controles globales de configuracion."

  - id: HAX-G18
    group: Con el tiempo
    title: "Notificar los cambios (Notify users about changes)"
    description: "Informar al usuario cuando el sistema anade o cambia capacidades."
    good_example: "Un aviso explica que ha cambiado el calculo de prioridad y por que."
    bad_example: "El comportamiento cambia sin que nadie lo comunique."
    anti_patterns:
      - "Cambios de capacidad no notificados."
